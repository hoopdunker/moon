name: fetch_threat_feeds
description: >
  Fetches live threat intelligence from abuse.ch APIs and CISA advisories.
  MalwareBazaar returns sample metadata only (hashes, family, tags) — no binaries
  are downloaded. URLhaus returns malicious URL metadata defanged for safe display.
  CISA returns the latest cybersecurity advisories as parsed text.
parameters:
  type: object
  properties:
    feed_type:
      type: string
      enum: [all, malware, urls, cisa_alerts]
      description: Which feeds to pull. Defaults to all.
    max_items:
      type: integer
      description: Maximum items to return per feed (default 10).
  required: []
mock_response: |

id: threat_intel_digest
description: >
  Generate a comprehensive threat intelligence digest by pulling from security news,
  CVE feeds, and live threat intelligence sources, then synthesizing everything into
  a structured brief for a CISO or security operations team.
tags:
  - threat-intel
  - digest
  - intel
  - news
  - cve
  - feeds
  - ciso
steps:
  - text: >
      Fetch general security news and breach intelligence from the last 7 days using sources:
      bleepingcomputer, hackernews, krebsonsecurity, sans_isc, darkreading, securityweek,
      the_record, cyberscoop, securityaffairs, databreaches_net. Set hours_back=168.
      Summarise the top stories. FOCUS ONLY ON: attacks targeting private companies,
      enterprises, financial institutions, critical infrastructure, government agencies,
      and defence organisations. SKIP: schools, universities, hospitals, non-profits, and
      individual victims unless the attack technique is novel or the threat actor is
      nation-state linked. For each story note: victim sector, attack type, threat actor
      (if known), and impact.
    tools: [fetch_security_news]
    skills: [threat_intel_analyst]

  - text: >
      Fetch nation-state and APT threat intelligence from the last 7 days using sources:
      recorded_future, mandiant, crowdstrike, microsoft_security, ncsc_uk, unit42, talos,
      securelist, sentinelone, sekoia, lumu, huntress. Set hours_back=168. Identify active
      threat actor campaigns, targeted sectors, TTPs observed, and any attribution. Focus
      on campaigns targeting technology companies, financial sector, defence, and critical
      infrastructure. Note which groups are most active and their primary targets.
    tools: [fetch_security_news]
    skills: [threat_intel_analyst]

  - text: >
      Fetch cryptocurrency and Web3 breach intelligence from the last 7 days using sources:
      chainalysis, cointelegraph_security, the_block, slowmist, coindesk, immunefi,
      elliptic, peckshield. Set hours_back=168. Identify hacks, rug pulls, or protocol
      exploits — note the attack vector, amount lost, affected chain, and whether funds
      were recovered.
    tools: [fetch_security_news]
    skills: [threat_intel_analyst]

  - text: >
      Fetch supply chain and open-source package security intelligence from the last 7 days
      using sources: socket_dev, sonatype, snyk, checkmarx, openssf, chainguard.
      Set hours_back=168. Identify malicious package publishes, dependency confusion attacks,
      typosquats, and critical CVEs in widely-used open-source libraries. Note the package
      name, registry (npm/PyPI/Maven/etc.), versions affected, and recommended action.
    tools: [fetch_security_news]
    skills: [threat_intel_analyst]

  - text: >
      Fetch recent critical and high-severity CVEs from the last 7 days (hours_back=168).
      Identify which are in the CISA KEV catalog (actively exploited), note their deadlines,
      and rank the top patching priorities with affected products, version ranges, and fix versions.
      Focus on CVEs affecting enterprise software, cloud infrastructure, network devices,
      and widely-deployed open-source components.
    tools: [fetch_latest_cves]
    skills: [threat_intel_analyst]

  - text: >
      Fetch active threat feeds covering CISA KEV additions and DeFi/Web3 hacks from the
      last 7 days (hours_back=168). For CISA KEV entries note the CVE, vendor, product,
      date added, and remediation deadline. For DeFi hacks note the protocol name, amount
      lost, chain, attack classification, technique, and whether funds were recovered.
      Rank crypto hacks by amount lost.
    tools: [fetch_threat_feeds]
    skills: [threat_intel_analyst]

  - text: >
      Fetch the environment profile, then synthesise all gathered intelligence into a
      structured threat intelligence brief following the intel_report guideline exactly.
      If no environment profile is configured, produce a generic brief without org-specific
      asset mapping — skip sections that require inventory cross-referencing.
      Produce sections in order: metrics snapshot, executive summary, top nation-state
      actors table (with MITRE ATT&CK TTP IDs), top vulnerabilities table, top malware
      families table, top breaches table (companies and enterprises only), top affected
      packages table, top MITRE TTPs table, CVE patching priorities table, active IOCs
      grouped by type, recommended actions, and intelligence gaps.
      If environment profile is available: cross-reference CVEs against asset inventory,
      map IOCs to log sources for hunting, flag control gaps, and compare KEV deadlines
      against patch SLAs. Connect the dots where a single campaign spans multiple categories.
    tools: [get_environment_profile]
    skills: [threat_intel_analyst, intel_editor]
    guidelines: [intel_report, output_format]

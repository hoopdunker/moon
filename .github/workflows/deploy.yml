name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_REGION: us-west-2
      ECR_REGISTRY: 489922706493.dkr.ecr.us-west-2.amazonaws.com
      ECR_REPOSITORY: moon
      ECS_CLUSTER: moon
      ECS_SERVICE: moon
      CONTAINER_NAME: moon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::489922706493:role/moon-ci-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        run: |
          IMAGE_TAG=${{ github.sha }}
          if aws ecr describe-images --repository-name $ECR_REPOSITORY --image-ids imageTag=$IMAGE_TAG --region $AWS_REGION > /dev/null 2>&1; then
            echo "Image $IMAGE_TAG already exists in ECR, skipping build"
          else
            docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          fi
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Register new task definition and deploy
        run: |
          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.build.outputs.tag }}"
          echo "Deploying image: $NEW_IMAGE"

          aws ecs describe-task-definition --task-definition $ECS_SERVICE \
            --query taskDefinition \
            | jq --arg image "$NEW_IMAGE" --arg container "$CONTAINER_NAME" \
                'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
                 | .containerDefinitions |= map(if .name == $container then .image = $image else . end)' \
          > task-def.json

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "Registered: $NEW_ARN"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "$NEW_ARN" \
            --output json | jq '{status:.service.status, taskDef:.service.taskDefinition}'

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
